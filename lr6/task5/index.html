<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task 5 - Burger Menu</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-wrap">
  <div class="menu-card">

    <!-- TOP ROW: image + menu list -->
    <div class="top-row cf">

      <!-- Left panel -->
      <div class="image-panel">
        <img src="png/burger.png" alt="Burger">
        <div class="promo-box">
          <div class="promo-title">Бургер-<br>Italian<br>!</div>
          <div class="promo-price"><span class="highlight">усього</span> 79 ГРН</div>
        </div>
      </div>

      <!-- Right menu panel -->
      <div class="menu-panel">
        <p class="catch-line">Лови момент!</p>

        <div class="menu-items cf">
          <!-- Left column -->
          <div class="menu-col">
            <div class="menu-item">
              <div class="item-name">Michigan</div>
              <div class="item-price">64.00 ГРН</div>
            </div>
            <div class="menu-item">
              <div class="item-name">Cheeseburger</div>
              <div class="item-price">59.00 ГРН</div>
            </div>
            <div class="menu-item">
              <div class="item-name">Ketchup Room 2</div>
              <div class="item-price">72.00 ГРН</div>
            </div>
          </div>

          <!-- Right column -->
          <div class="menu-col">
            <div class="menu-item">
              <div class="item-name">Beef BBQ</div>
              <div class="item-price">59.00 ГРН</div>
            </div>
            <div class="menu-item">
              <div class="item-name">Ketchup Room</div>
              <div class="item-price">68.00 ГРН</div>
            </div>
            <div class="menu-item">
              <div class="item-name">Elvis</div>
              <div class="item-price">55.00 ГРН</div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /top-row -->

    <!-- FOOTER -->
    <div class="footer-row cf">
      <button class="btn-menu">Все Меню</button>
    </div>

  </div><!-- /menu-card -->
</div>

</body>
</html>
